<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Auto-refresh every 5 minutes — picks up GitHub Pages updates automatically -->
    <meta http-equiv="refresh" content="300" />
    <title>Nathan // Command Center</title>
    <style>
      :root {
        --bg:        #020a14;
      --panel:     rgba(0, 18, 36, 0.72);
      --border:    rgba(0, 212, 255, 0.18);
      --cyan:      #00d4ff;
      --cyan-dim:  rgba(0, 212, 255, 0.12);
      --orange:    #ff7800;
              --orange-dim:rgba(255, 120, 0, 0.12);
      --green:     #00ff99;
      --green-dim: rgba(0, 255, 153, 0.1);
      --text:      #d8f0ff;
              --muted:     #4a7a99;
      --dim:       #1a3a52;
}

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
            background: var(--bg);
      color: var(--text);
      font-family: "Courier New", "Menlo", "Consolas", monospace;
      min-height: 100vh;
      overflow: hidden;
      user-select: none;
}

    body::after {
            content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(0, 212, 255, 0.025) 50%, transparent 100%);
      background-size: 100% 6px;
      pointer-events: none;
      z-index: 1000;
      animation: scan 8s linear infinite;
}

    @keyframes scan {
            0%   { background-position: 0 -100vh; }
      100% { background-position: 0 100vh; }
}

    body::before {
            content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
}

    .shell { position: relative; z-index: 1; display: grid; grid-template-rows: auto 1fr auto; min-height: 100vh; padding: 20px 28px; gap: 18px; }
    .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 14px; }
    .header-left { display: flex; align-items: baseline; gap: 16px; }
    .identity { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.22em; color: var(--cyan); text-shadow: 0 0 22px rgba(0,212,255,0.6); }
    .identity-sub { font-size: 0.72rem; letter-spacing: 0.28em; color: var(--muted); text-transform: uppercase; }
          .header-right { display: flex; align-items: center; gap: 32px; }
    .clock { font-size: 2.4rem; font-weight: 700; letter-spacing: 0.06em; color: var(--text); text-shadow: 0 0 16px rgba(0,212,255,0.3); }
    .date-block { text-align: right; }
    .date-day { font-size: 0.72rem; letter-spacing: 0.22em; color: var(--cyan); text-transform: uppercase; }
    .date-full { font-size: 0.85rem; color: var(--muted); letter-spacing: 0.1em; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse-dot 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

    .projects { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .project-card { position: relative; padding: 20px; border: 1px solid var(--border); border-radius: 4px; background: var(--panel); overflow: hidden; display: flex; flex-direction: column; gap: 12px; }
    .project-card::before, .project-card::after { content: ""; position: absolute; width: 12px; height: 12px; }
    .project-card::before { top: -1px; left: -1px; border-top: 2px solid var(--accent-color, var(--cyan)); border-left: 2px solid var(--accent-color, var(--cyan)); }
    .project-card::after { bottom: -1px; right: -1px; border-bottom: 2px solid var(--accent-color, var(--cyan)); border-right: 2px solid var(--accent-color, var(--cyan)); }
    .project-card.priority-high { --accent-color: var(--orange); border-color: rgba(255,120,0,0.22); background: rgba(30,12,0,0.5); }
          .project-card.priority-active { --accent-color: var(--cyan); }
    .project-card.priority-building { --accent-color: #a259ff; border-color: rgba(162,89,255,0.2); background: rgba(20,8,40,0.5); }
                .project-card.priority-fun { --accent-color: var(--green); border-color: rgba(0,255,153,0.16); background: rgba(0,20,12,0.5); }
    .card-glow { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent-color, var(--cyan)); box-shadow: 0 0 18px 2px var(--accent-color, var(--cyan)); }
    .card-label { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent-color, var(--cyan)); }
    .card-title { font-size: 1.15rem; font-weight: 700; letter-spacing: 0.06em; line-height: 1.2; color: var(--text); }
    .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.55; flex: 1; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 3px 8px; border: 1px solid rgba(255,255,255,0.08); border-radius: 2px; color: var(--muted); }
    .card-status { display: flex; align-items: center; gap: 7px; font-size: 0.7rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent-color, var(--cyan)); }
    .card-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-color, var(--cyan)); box-shadow: 0 0 8px var(--accent-color, var(--cyan)); animation: pulse-dot 1.8s ease-in-out infinite; }
    .card-bar { height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden; }
    .card-bar-fill { height: 100%; background: var(--accent-color, var(--cyan)); box-shadow: 0 0 8px var(--accent-color, var(--cyan)); border-radius: 1px; }

    .bottombar { display: flex; align-items: center; border-top: 1px solid var(--border); padding-top: 14px; }
    .life-item { display: flex; align-items: center; gap: 10px; padding: 0 24px; border-right: 1px solid var(--border); }
    .life-item:first-child { padding-left: 0; }
    .life-item:last-child { border-right: none; }
    .life-icon { font-size: 1.1rem; }
    .life-name { font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); }
    .life-status { font-size: 0.72rem; letter-spacing: 0.12em; font-weight: 700; }
    .life-status.active { color: var(--green); text-shadow: 0 0 10px var(--green); }
    .life-status.paused { color: var(--orange); }
    .life-status.new { color: #a259ff; text-shadow: 0 0 10px #a259ff; }

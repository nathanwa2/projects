<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — System Error</title>
<style>
  :root {
    --bg: #020a14;
    --cyan: #00d4ff;
    --red: #ff3b5c;
    --orange: #ff7800;
    --dim: #0d2137;
    --text: #c8e0f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  /* scan lines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.018) 2px, rgba(0,212,255,0.018) 4px);
    pointer-events: none; z-index: 100;
  }

  /* sweeping scan line */
  .sweep {
    position: fixed; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.6), transparent);
    animation: sweep 4s linear infinite;
    z-index: 101; pointer-events: none;
  }
  @keyframes sweep { 0%{top:-2px} 100%{top:100vh} }

  /* corners */
  .corner {
    position: fixed; width: 40px; height: 40px;
    border-color: rgba(0,212,255,0.3); border-style: solid;
  }
  .c-tl { top:16px; left:16px;  border-width: 2px 0 0 2px; }
  .c-tr { top:16px; right:16px; border-width: 2px 2px 0 0; }
  .c-bl { bottom:16px; left:16px;  border-width: 0 0 2px 2px; }
  .c-br { bottom:16px; right:16px; border-width: 0 2px 2px 0; }

  /* main layout */
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    position: relative;
    z-index: 10;
  }

  /* JARVIS helmet SVG */
  .helmet-wrap {
    position: relative;
    margin-bottom: 32px;
  }
  .helmet-glow {
    position: absolute; inset: -30px;
    background: radial-gradient(ellipse, rgba(255,59,92,0.12) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  /* 404 number */
  .code-404 {
    font-size: clamp(80px, 18vw, 160px);
    font-weight: bold;
    color: var(--red);
    letter-spacing: 8px;
    line-height: 1;
    text-shadow:
      0 0 20px rgba(255,59,92,0.8),
      0 0 60px rgba(255,59,92,0.4),
      0 0 120px rgba(255,59,92,0.2);
    animation: flicker 6s infinite;
    margin-bottom: 8px;
  }
  @keyframes flicker {
    0%,95%,100%{opacity:1}
    96%{opacity:0.7}
    97%{opacity:1}
    98%{opacity:0.5}
    99%{opacity:1}
  }

  .error-label {
    font-size: 10px;
    letter-spacing: 6px;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 40px;
    opacity: 0.8;
  }

  /* JARVIS readout */
  .readout {
    width: min(480px, 90vw);
    border: 1px solid var(--dim);
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 32px;
    background: rgba(0,212,255,0.02);
    position: relative;
  }
  .readout::before {
    content: 'J.A.R.V.I.S. DIAGNOSTIC';
    position: absolute; top: -9px; left: 16px;
    font-size: 8px; letter-spacing: 3px;
    color: var(--cyan); background: var(--bg);
    padding: 0 8px;
  }
  .readout-line {
    font-size: 11px;
    letter-spacing: 1px;
    color: #4a6a80;
    margin-bottom: 6px;
    display: flex;
    gap: 8px;
  }
  .readout-line:last-child { margin-bottom: 0; }
  .rl-key { color: var(--cyan); min-width: 120px; }
  .rl-val { color: var(--text); }
  .rl-val.bad { color: var(--red); }
  .rl-val.warn { color: var(--orange); }

  /* typing cursor on last line */
  .cursor {
    display: inline-block;
    width: 7px; height: 12px;
    background: var(--cyan);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* return button */
  .return-btn {
    padding: 13px 32px;
    border: 1px solid var(--cyan);
    border-radius: 4px;
    background: rgba(0,212,255,0.05);
    color: var(--cyan);
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }
  .return-btn:hover {
    background: rgba(0,212,255,0.12);
    box-shadow: 0 0 24px rgba(0,212,255,0.25);
  }

  /* helmet svg animation */
  .helm-eye { animation: eyePulse 2s ease-in-out infinite; }
  @keyframes eyePulse { 0%,100%{opacity:0.6;filter:drop-shadow(0 0 4px #ff3b5c)} 50%{opacity:1;filter:drop-shadow(0 0 14px #ff3b5c)} }

  .helm-ring {
    animation: helmSpin 8s linear infinite;
    transform-origin: 100px 100px;
  }
  @keyframes helmSpin { to { transform: rotate(360deg); } }

  /* hud circles */
  .hud-ring {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,0.06);
    pointer-events: none;
    animation: hudPulse 4s ease-in-out infinite;
  }
  .hud-ring:nth-child(1) { width:600px;height:600px; }
  .hud-ring:nth-child(2) { width:800px;height:800px; animation-delay:0.5s; }
  .hud-ring:nth-child(3) { width:1000px;height:1000px; animation-delay:1s; }
  @keyframes hudPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
</style>
</head>
<body>

<div class="sweep"></div>
<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<!-- subtle HUD rings in background -->
<div class="hud-ring" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
<div class="hud-ring" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)"></div>
<div class="hud-ring" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)"></div>

<div class="wrap">

  <!-- Iron Man Helmet SVG -->
  <div class="helmet-wrap">
    <div class="helmet-glow"></div>
    <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

      <!-- outer spinning arc -->
      <g class="helm-ring">
        <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>
        <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(0,212,255,0.3)"
          stroke-width="1.5" stroke-dasharray="40 240" stroke-linecap="round"/>
      </g>

      <!-- helmet outline — top dome -->
      <path d="M100 22
        C68 22, 44 40, 36 62
        L30 90
        L30 120
        C30 148, 44 162, 58 170
        L72 178
        L100 182
        L128 178
        L142 170
        C156 162, 170 148, 170 120
        L170 90
        L164 62
        C156 40, 132 22, 100 22 Z"
        fill="#0a1628" stroke="rgba(0,212,255,0.4)" stroke-width="1.5"/>

      <!-- face plate division line -->
      <path d="M50 108 L150 108" stroke="rgba(0,212,255,0.25)" stroke-width="1" stroke-dasharray="4 4"/>

      <!-- cheek panels -->
      <path d="M30 108 L50 90 L50 125 L30 130 Z" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
      <path d="M170 108 L150 90 L150 125 L170 130 Z" fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>

      <!-- forehead detail -->
      <path d="M72 22 L72 55 L100 48 L128 55 L128 22" fill="none" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>

      <!-- LEFT EYE -->
      <g class="helm-eye">
        <path d="M46 85 L72 78 L72 98 L46 102 Z" fill="rgba(255,59,92,0.15)"/>
        <path d="M48 86 L70 79 L70 97 L48 100 Z" fill="rgba(255,59,92,0.35)"
          stroke="#ff3b5c" stroke-width="0.5"/>
        <path d="M52 88 L68 83 L68 95 L52 97 Z" fill="rgba(255,59,92,0.7)"/>
      </g>

      <!-- RIGHT EYE -->
      <g class="helm-eye" style="animation-delay:0.15s">
        <path d="M154 85 L128 78 L128 98 L154 102 Z" fill="rgba(255,59,92,0.15)"/>
        <path d="M152 86 L130 79 L130 97 L152 100 Z" fill="rgba(255,59,92,0.35)"
          stroke="#ff3b5c" stroke-width="0.5"/>
        <path d="M148 88 L132 83 L132 95 L148 97 Z" fill="rgba(255,59,92,0.7)"/>
      </g>

      <!-- nose/center ridge -->
      <path d="M95 48 L95 108 M105 48 L105 108" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
      <rect x="92" y="100" width="16" height="8" rx="2" fill="rgba(0,212,255,0.06)" stroke="rgba(0,212,255,0.2)" stroke-width="0.5"/>

      <!-- chin vents -->
      <rect x="70" y="148" width="12" height="4" rx="1" fill="rgba(0,212,255,0.15)"/>
      <rect x="86" y="148" width="28" height="4" rx="1" fill="rgba(0,212,255,0.15)"/>
      <rect x="118" y="148" width="12" height="4" rx="1" fill="rgba(0,212,255,0.15)"/>

      <!-- jaw line detail -->
      <path d="M58 130 L72 138 L100 142 L128 138 L142 130"
        fill="none" stroke="rgba(0,212,255,0.25)" stroke-width="1"/>

      <!-- chest arc piece (bottom of helmet) -->
      <path d="M58 170 Q100 185 142 170 L142 178 Q100 195 58 178 Z"
        fill="rgba(0,212,255,0.04)" stroke="rgba(0,212,255,0.15)" stroke-width="1"/>

      <!-- scan line over helmet -->
      <rect x="30" y="0" width="140" height="200" fill="url(#helmScan)" opacity="0.3"/>
      <defs>
        <linearGradient id="helmScan" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="transparent"/>
          <stop offset="45%" stop-color="rgba(0,212,255,0.05)"/>
          <stop offset="50%" stop-color="rgba(0,212,255,0.15)"/>
          <stop offset="55%" stop-color="rgba(0,212,255,0.05)"/>
          <stop offset="100%" stop-color="transparent"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- 404 -->
  <div class="code-404">404</div>
  <div class="error-label">File Not Found</div>

  <!-- JARVIS readout -->
  <div class="readout">
    <div class="readout-line"><span class="rl-key">STATUS</span><span class="rl-val bad">CRITICAL — RESOURCE MISSING</span></div>
    <div class="readout-line"><span class="rl-key">REQUEST</span><span class="rl-val warn" id="req-path">unknown path</span></div>
    <div class="readout-line"><span class="rl-key">SYSTEM</span><span class="rl-val">nathanwa2.github.io</span></div>
    <div class="readout-line"><span class="rl-key">SUIT STATUS</span><span class="rl-val">Mark L — online ✓</span></div>
    <div class="readout-line"><span class="rl-key">SUGGESTION</span><span class="rl-val">Return to base<span class="cursor"></span></span></div>
  </div>

  <a href="/projects/" class="return-btn">⬅ Return to Base</a>

</div>

<script>
  // show the bad path
  document.getElementById('req-path').textContent = location.pathname || '/unknown';

  // animated readout lines — type them in one by one
  const lines = document.querySelectorAll('.readout-line');
  lines.forEach((line, i) => {
    line.style.opacity = '0';
    setTimeout(()=>{ line.style.transition='opacity 0.3s'; line.style.opacity='1'; }, i * 200 + 300);
  });
</script>
</body>
</html>
